* {

}

body {

  color: var(--deep);
  min-height: 100vh;
  padding: 24px;
}

.page {
  max-width: 780px;
  margin: 0 auto;
}

.card {
  background: rgba(255, 250, 247, 0.92);
  border: 1px solid rgba(169, 72, 22, 0.16);
  border-radius: 28px;
  padding: 34px;
  box-shadow: 0 18px 50px rgba(75, 42, 32, 0.12);
  text-align: center;
}

.logo {
  width: min(100%, 520px);
  border-radius: 20px;
  margin-bottom: 12px;
}

.script {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(48px, 10vw, 86px);
  color: var(--rust);
  line-height: 0.95;
  margin: 6px 0 4px;
  font-weight: 400;
}

.subtitle {
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-size: 13px;
  font-weight: 700;
  color: var(--sage);
  margin-bottom: 18px;
}

h2 {
  font-size: 26px;
  margin: 12px 0 8px;
}

p {
  margin: 0 0 22px;
  color: #6c4a40;
}

.search-wrap {
  display: flex;
  gap: 10px;
  margin: 20px auto 10px;
  max-width: 620px;
}

input {
  flex: 1;
  padding: 16px 18px;
  border: 1px solid rgba(169, 72, 22, 0.25);
  border-radius: 16px;
  font-size: 16px;
  outline: none;
  background: white;
}

input:focus {
  border-color: var(--rust);
  box-shadow: 0 0 0 4px rgba(169, 72, 22, 0.08);
}

button {
  border: 0;
  border-radius: 16px;
  padding: 16px 24px;
  background: var(--rust);
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
}

.result {
  max-width: 620px;
  margin: 20px auto 0;
  text-align: left;
}

.guest {
  background: white;
  border: 1px solid rgba(159, 185, 173, 0.45);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: 0 8px 22px rgba(75, 42, 32, 0.07);
}

.name {
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 6px;
}

.table {
  font-size: 17px;
}

.table span {
  color: var(--rust);
  font-weight: 800;
}

.note {
  font-size: 13px;
  margin-top: 18px;
  color: #8d6c63;
}

.no-result {
  text-align: center;
  padding: 18px;
  border-radius: 18px;
  background: rgba(247, 217, 216, 0.45);
}

@media (max-width: 600px) {
  body {
    padding: 14px;
  }
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }
  .search-wrap {
    flex-direction: column;
  }
  button {
    width: 100%;
  }
}
</style>
</head>

      <div id="result" class="result"></div>

function findSeat() {
  const q = document.getElementById('name').value.trim().toLowerCase();
  const r = document.getElementById('result');

  if (!q) {
    r.innerHTML = '';
    return;
  }

  const matches = guests.filter(g => g.name.toLowerCase().includes(q));

  if (matches.length === 0) {
    r.innerHTML = '<div class="no-result">Name not found. Please check the spelling or ask the registration team.</div>';
    return;
  }

  r.innerHTML = matches.map(m => `
    <div class="guest">
      <div class="name">${m.name}</div>
      <div class="table">Table Number: <span>${m.table}</span></div>
    </div>
  `).join('');
